# blindar deterministic checks
# Copiado pra .github/workflows/blindar.yml no projeto-alvo.
# Bloqueia merge se qualquer check determinístico falhar.

name: blindar checks
on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:

concurrency:
  group: blindar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  blindar-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write   # pra postar comentário com resumo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # pra git history em outros checks

      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install Node deps
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Setup Python
        if: hashFiles('requirements.txt') != ''
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Install gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Install ripgrep + jq + bc
        run: sudo apt-get update && sudo apt-get install -y ripgrep jq bc

      - name: Install trivy (opcional, pra Docker)
        if: hashFiles('Dockerfile') != ''
        run: |
          wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Run blindar checks
        id: blindar
        run: |
          chmod +x scripts/blindar/*.sh
          bash scripts/blindar/run-all.sh

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blindar-results
          path: .blindar/results/

      - name: Termination check
        if: success()
        run: bash scripts/blindar/check-termination.sh

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const agg = JSON.parse(fs.readFileSync('.blindar/results/aggregate.json', 'utf8'));
            const body = `## 🛡️ blindar checks

            | Status | Count |
            |---|---|
            | ✅ Passed | ${agg.passed} |
            | ❌ Failed | ${agg.failed} |
            | ⏭️ Skipped | ${agg.skipped} |

            ### Findings by severity
            - 🔴 Crit: **${agg.findings_by_severity.crit}**
            - 🟠 High: **${agg.findings_by_severity.high}**
            - 🟡 Med: ${agg.findings_by_severity.med}
            - ⚪ Low: ${agg.findings_by_severity.low}

            Duração: ${agg.duration_sec}s`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
