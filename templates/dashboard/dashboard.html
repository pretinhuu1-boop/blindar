<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>blindar — dashboard local</title>
<style>
  :root{--bg:#0a0e1a;--fg:#e4e7ed;--mut:#7a8599;--card:#141a2a;--ok:#22c55e;--warn:#eab308;--err:#ef4444;--crit:#dc2626;--accent:#3b82f6}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font:14px/1.5 ui-sans-serif,system-ui,-apple-system,sans-serif;padding:20px}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #1f2937}
  h1{font-size:22px;font-weight:700}
  h1 .v{color:var(--mut);font-weight:400;font-size:13px;margin-left:8px}
  .meta{color:var(--mut);font-size:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
  .stat{background:var(--card);padding:16px;border-radius:8px;border:1px solid #1f2937}
  .stat .n{font-size:28px;font-weight:700}
  .stat .l{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  .stat.crit .n{color:var(--crit)} .stat.high .n{color:var(--err)} .stat.med .n{color:var(--warn)} .stat.ok .n{color:var(--ok)}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #1f2937;font-size:13px}
  th{background:#0f1420;color:var(--mut);text-transform:uppercase;font-size:11px;letter-spacing:.5px}
  tr:hover{background:#0f1420}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
  .badge.crit{background:rgba(220,38,38,.2);color:var(--crit)}
  .badge.high{background:rgba(239,68,68,.2);color:var(--err)}
  .badge.med{background:rgba(234,179,8,.2);color:var(--warn)}
  .badge.low{background:rgba(122,133,153,.2);color:var(--mut)}
  .badge.passed{background:rgba(34,197,94,.2);color:var(--ok)}
  .badge.failed{background:rgba(239,68,68,.2);color:var(--err)}
  .badge.skipped{background:rgba(122,133,153,.2);color:var(--mut)}
  .file{font-family:ui-monospace,monospace;font-size:12px;color:var(--mut)}
  .empty{text-align:center;padding:48px;color:var(--mut)}
  footer{margin-top:32px;padding-top:16px;border-top:1px solid #1f2937;color:var(--mut);font-size:12px;text-align:center}
</style>
</head>
<body>

<header>
  <h1>blindar dashboard <span class="v" id="version">v?</span></h1>
  <div class="meta" id="meta">carregando...</div>
</header>

<div class="grid" id="stats"></div>

<h3 style="margin:24px 0 12px;font-size:14px;text-transform:uppercase;color:var(--mut);letter-spacing:.5px">Resultados por check</h3>
<table id="results"><thead><tr><th>Check</th><th>Status</th><th>Findings</th></tr></thead><tbody></tbody></table>

<h3 style="margin:24px 0 12px;font-size:14px;text-transform:uppercase;color:var(--mut);letter-spacing:.5px">Findings detalhados</h3>
<table id="findings"><thead><tr><th>Sev</th><th>Check</th><th>Mensagem</th><th>Local</th></tr></thead><tbody></tbody></table>

<footer>
  blindar — <a href="https://github.com/pretinhuu1-boop/blindar" style="color:var(--accent)">github.com/pretinhuu1-boop/blindar</a><br>
  Arquivo: <span class="file" id="src">.blindar/report.json</span>
</footer>

<script>
async function load(){
  try {
    const r = await fetch('./report.json');
    if (!r.ok) throw new Error('report.json não encontrado');
    const data = await r.json();
    render(data);
  } catch(e) {
    document.body.innerHTML = '<div class="empty">⚠ '+e.message+'<br><br>Rode: <code>npx blindar check --json &gt; .blindar/report.json</code></div>';
  }
}
function render(d){
  document.getElementById('version').textContent = 'v'+(d.version||'?');
  document.getElementById('meta').textContent = (d.timestamp||'') + ' • ' + (d.project||'');

  const sev = {crit:0,high:0,med:0,low:0};
  const status = {passed:0,failed:0,skipped:0};
  (d.results||[]).forEach(r => {
    status[r.status] = (status[r.status]||0)+1;
    (r.findings||[]).forEach(f => sev[f.severity] = (sev[f.severity]||0)+1);
  });

  document.getElementById('stats').innerHTML = `
    <div class="stat crit"><div class="n">${sev.crit}</div><div class="l">críticas</div></div>
    <div class="stat high"><div class="n">${sev.high}</div><div class="l">altas</div></div>
    <div class="stat med"><div class="n">${sev.med}</div><div class="l">médias</div></div>
    <div class="stat ok"><div class="n">${status.passed}</div><div class="l">checks ok</div></div>
    <div class="stat"><div class="n">${status.failed}</div><div class="l">falharam</div></div>
    <div class="stat"><div class="n">${status.skipped}</div><div class="l">skipped</div></div>`;

  const tbR = document.querySelector('#results tbody');
  tbR.innerHTML = (d.results||[]).map(r =>
    `<tr><td>${r.agent}</td><td><span class="badge ${r.status}">${r.status}</span></td><td>${(r.findings||[]).length}</td></tr>`
  ).join('') || '<tr><td colspan="3" class="empty">sem resultados</td></tr>';

  const tbF = document.querySelector('#findings tbody');
  const all = [];
  (d.results||[]).forEach(r => (r.findings||[]).forEach(f => all.push({...f, agent:r.agent})));
  const order = {crit:0,high:1,med:2,low:3};
  all.sort((a,b)=>(order[a.severity]??9)-(order[b.severity]??9));
  tbF.innerHTML = all.map(f =>
    `<tr><td><span class="badge ${f.severity}">${f.severity}</span></td><td>${f.agent}</td><td>${f.message}</td><td class="file">${f.file||''}${f.line?':'+f.line:''}</td></tr>`
  ).join('') || '<tr><td colspan="4" class="empty">nenhum finding 🎉</td></tr>';
}
load();
</script>
</body>
</html>
